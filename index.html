<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>開餵食堂 APP</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="topbar">
    <h1>開餵食堂｜經營管理 APP</h1>
    <p>修正版</p>
  </header>

  <section class="card">
    <h2>Supabase 連線設定</h2>
    <div class="grid2">
      <div>
        <label>Supabase URL</label>
        <input id="supabaseUrl" placeholder="https://xxxx.supabase.co" />
      </div>
      <div>
        <label>Publishable Key</label>
        <input id="supabaseKey" placeholder="sb_publishable__xxxx" />
      </div>
    </div>
    <div class="row">
      <button id="saveConnBtn">儲存設定</button>
      <button id="syncBtn" class="secondary">同步 Supabase</button>
      <span id="connMsg"></span>
    </div>
  </section>

  <nav class="tabs">
    <button data-tab="dashboard">首頁</button>
    <button data-tab="revenue">營業額</button>
    <button data-tab="gas">瓦斯</button>
    <button data-tab="cost">成本</button>
    <button data-tab="fixed">固定成本</button>
    <button data-tab="report">報表</button>
  </nav>

  <section id="dashboard" class="card tab">
    <h2>首頁儀表板</h2>
    <div class="cards">
      <div class="mini"><h3>今日營業額</h3><div id="todayRevenue">0</div></div>
      <div class="mini"><h3>今日瓦斯</h3><div id="todayGas">0</div></div>
      <div class="mini"><h3>今日成本</h3><div id="todayCost">0</div></div>
      <div class="mini"><h3>今日損益</h3><div id="todayProfit">0</div></div>
      <div class="mini"><h3>本月營業額</h3><div id="monthRevenue">0</div></div>
      <div class="mini"><h3>本月變動成本</h3><div id="monthVariable">0</div></div>
      <div class="mini"><h3>本月固定成本</h3><div id="monthFixed">0</div></div>
      <div class="mini"><h3>本月預估淨利</h3><div id="monthProfit">0</div></div>
    </div>
  </section>

  <section id="revenue" class="card tab hidden">
    <h2>營業額</h2>
    <input type="hidden" id="revId" />
    <div class="grid3">
      <div><label>日期</label><input id="revDate" type="date" /></div>
      <div><label>現金</label><input id="revCash" type="number" value="0" /></div>
      <div><label>線上支付</label><input id="revOnline" type="number" value="0" /></div>
      <div><label>Uber</label><input id="revUber" type="number" value="0" /></div>
      <div><label>其他</label><input id="revOther" type="number" value="0" /></div>
      <div><label>訂單數</label><input id="revOrders" type="number" value="0" /></div>
    </div>
    <label>備註</label><textarea id="revNote"></textarea>
    <div class="row">
      <button id="saveRevenueBtn">儲存營業額</button>
      <button id="clearRevenueBtn" class="secondary">清空</button>
    </div>
    <h3>營業額紀錄</h3>
    <div id="revenueList"></div>
  </section>

  <section id="gas" class="card tab hidden">
    <h2>瓦斯</h2>
    <input type="hidden" id="gasId" />
    <div class="grid3">
      <div><label>日期</label><input id="gasDate" type="date" /></div>
      <div><label>表數</label><input id="gasMeter" type="number" step="0.001" /></div>
      <div><label>每度成本</label><input id="gasUnitCost" type="number" value="128" /></div>
    </div>
    <label>備註</label><textarea id="gasNote"></textarea>
    <div class="row">
      <button id="saveGasBtn">儲存瓦斯</button>
      <button id="clearGasBtn" class="secondary">清空</button>
    </div>
    <h3>瓦斯紀錄</h3>
    <div id="gasList"></div>
  </section>

  <section id="cost" class="card tab hidden">
    <h2>成本明細</h2>
    <input type="hidden" id="costId" />
    <div class="grid3">
      <div><label>日期</label><input id="costDate" type="date" /></div>
      <div>
        <label>類別</label>
        <select id="costCategory">
          <option value="">請選擇</option>
          <option>菜商</option><option>肉品</option><option>海鮮</option>
          <option>雜貨</option><option>麵類</option><option>包材</option>
          <option>員工餐</option><option>電費</option><option>瓦斯</option>
          <option>網路</option><option>薪資</option><option>其他</option>
        </select>
      </div>
      <div><label>品項</label><input id="costItem" /></div>
      <div><label>金額</label><input id="costAmount" type="number" /></div>
      <div><label>廠商</label><input id="costSupplier" /></div>
      <div><label>數量/說明</label><input id="costQty" /></div>
    </div>
    <div class="row">
      <label><input id="costUnpaid" type="checkbox" /> 未結帳</label>
      <label><input id="costStaffMeal" type="checkbox" /> 員工餐</label>
    </div>
    <label>備註</label><textarea id="costNote"></textarea>
    <div class="row">
      <button id="saveCostBtn">儲存成本</button>
      <button id="clearCostBtn" class="secondary">清空</button>
    </div>
    <h3>成本紀錄</h3>
    <div id="costList"></div>
  </section>

  <section id="fixed" class="card tab hidden">
    <h2>固定成本</h2>
    <input type="hidden" id="fixedId" />
    <div class="grid3">
      <div><label>鍵值</label><input id="fixedKey" placeholder="rent" /></div>
      <div><label>名稱</label><input id="fixedName" placeholder="房租" /></div>
      <div><label>每月金額</label><input id="fixedAmount" type="number" /></div>
    </div>
    <label>備註</label><textarea id="fixedNote"></textarea>
    <div class="row">
      <button id="saveFixedBtn">儲存固定成本</button>
      <button id="clearFixedBtn" class="secondary">清空</button>
    </div>
    <h3>固定成本列表</h3>
    <div id="fixedList"></div>
  </section>

  <section id="report" class="card tab hidden">
    <h2>月報表</h2>
    <div class="row">
      <label>月份</label>
      <input id="reportMonth" type="month" />
      <button id="refreshBtn">更新</button>
      <button id="demoBtn" class="secondary">載入示範資料</button>
      <button id="exportBtn" class="secondary">匯出 JSON</button>
    </div>
    <div id="reportSummary"></div>
  </section>

<script src="app.js"></script>
</body>
</html>
