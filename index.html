<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>開餵食堂APP</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="apple-touch-icon" href="icon.png">
</head>
<body>

<h1>開餵食堂管理系統</h1>

<h2>營業額</h2>
日期 <input type="date" id="date"><br>
現金 <input type="number" id="cash"><br>
線上 <input type="number" id="online"><br>
Uber <input type="number" id="uber"><br>
其他 <input type="number" id="other"><br>

<h3>總營業額：<span id="total">0</span></h3>
<button onclick="saveRevenue()">儲存</button>

<hr>

<h2>瓦斯</h2>
日期 <input type="date" id="gas_date"><br>
度數 <input type="number" id="gas_degree"><br>
起始度數 <input type="checkbox" id="gas_start"><br>
<button onclick="saveGas()">儲存瓦斯</button>

<hr>

<h2>成本</h2>
日期 <input type="date" id="cost_date"><br>

類別
<select id="category">
<option>菜</option>
<option>肉</option>
<option>雜貨</option>
<option>包材</option>
<option>瓦斯</option>
<option>水費</option>
<option>開元半成品</option>
</select><br>

品項 <input type="text" id="item"><br>
數量 <input type="number" id="qty"><br>

單位
<select id="unit">
<option>斤</option>
<option>公斤</option>
<option>包</option>
<option>箱</option>
</select><br>

金額 <input type="number" id="amount"><br>
備註 <input type="text" id="note"><br>

<button onclick="saveCost()">儲存成本</button>

<script src="app.js"></script>

</body>
</html>
